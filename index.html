<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BBH+Bartle&family=BBH+Bogle&family=Caveat:wght@400..700&family=Jersey+10&family=Lora:ital,wght@0,400..700;1,400..700&family=Micro+5&family=PT+Sans+Narrow:wght@400;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="grid-container">

        <div class="date-container">
            <div class="date">
                <h2 id="day">MONDAY</h2>
                <div class="circle">
                    <h2 id="date">15</h2>
                </div>
                <h2 id="month">APRIL</h2>
            </div>
        </div>
        
        <div class="right-column">
            <div class="progress-container">
                <h2>PROGRESSION</h2>
                <div class="progress-bar-bg">
                    <div class="progress-bar"></div>
                </div>
            </div>
            
            <div class="input-container">
                <input type="text" id="taskInput" placeholder="Write your task here...">
                <button>+</button>
            </div>
        </div>
        
        
        <div class="task-container">
            
        </div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
